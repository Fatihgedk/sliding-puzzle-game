<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memes Slide Puzzle</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
</head>
<body>
    <!-- Game Container -->
    <div id="game-container">
        <!-- Level Splash Screen Overlay (Updated to Meme style) -->
        <div id="level-splash" class="splash-overlay">
            <h1 id="splash-level-text">LEVEL 1</h1>
        </div>

        <!-- 1. Intro / Menu Screen -->
        <div id="menu-screen" class="screen active">
            <!-- Top Right Mute Button on Homepage -->
            <div class="menu-hud-actions">
                <button class="hud-btn icon-only" id="home-sound-toggle" title="Toggle Sound">
                    <!-- Sound SVG injected by JS dynamically -->
                </button>
            </div>

            <div class="logo-container">
                <!-- Premium Inline Vector SVG Logo -->
                <svg class="game-logo-svg" viewBox="0 0 100 100" width="120" height="120">
                    <defs>
                        <linearGradient id="logo-pink" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ec4899" />
                            <stop offset="100%" stop-color="#a855f7" />
                        </linearGradient>
                        <linearGradient id="logo-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#06b6d4" />
                            <stop offset="100%" stop-color="#2563eb" />
                        </linearGradient>
                        <linearGradient id="logo-amber" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f59e0b" />
                            <stop offset="100%" stop-color="#ea580c" />
                        </linearGradient>
                        <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3.5" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <!-- Outer neon glowing track ring -->
                    <circle cx="50" cy="50" r="46" stroke="url(#logo-cyan)" stroke-width="1.5" fill="none" stroke-dasharray="8 6" filter="url(#glow-heavy)" opacity="0.8"/>
                    <!-- 3x3 Sliding Puzzle Grid Logo Tiles -->
                    <rect x="16" y="16" width="18" height="18" rx="4" fill="url(#logo-pink)" filter="url(#glow-heavy)"/>
                    <rect x="41" y="16" width="18" height="18" rx="4" fill="url(#logo-cyan)" />
                    <rect x="66" y="16" width="18" height="18" rx="4" fill="url(#logo-amber)" />
                    <rect x="16" y="41" width="18" height="18" rx="4" fill="url(#logo-cyan)" />
                    <rect x="41" y="41" width="18" height="18" rx="4" fill="url(#logo-pink)" filter="url(#glow-heavy)"/>
                    <rect x="66" y="41" width="18" height="18" rx="4" fill="url(#logo-amber)" />
                    <rect x="16" y="66" width="18" height="18" rx="4" fill="url(#logo-amber)" />
                    <rect x="41" y="66" width="18" height="18" rx="4" fill="url(#logo-cyan)" />
                    <rect x="66" y="66" width="18" height="18" rx="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="3 3"/>
                </svg>

                <h1 class="game-title">MEMES SLIDE PUZZLE</h1>
                <p class="game-subtitle">Solve Classic &amp; Legend Meme Puzzles!</p>
            </div>

            <div class="menu-options">
                <!-- Action Buttons -->
                <button class="primary-btn" id="play-btn">PLAY</button>
                <button class="secondary-btn" id="levels-btn">LEVELS</button>
                <button class="secondary-btn" id="settings-btn">SETTINGS</button>
            </div>

            <div class="footer">
                <p>Designed by Verzk</p>
            </div>
        </div>

        <!-- 1.5 Levels Selection Screen -->
        <div id="levels-screen" class="screen">
            <div class="levels-header">
                <button class="hud-btn" id="back-from-levels-btn">
                    <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7M5 12h14"/></svg>
                    Menu
                </button>
                <h2 class="levels-title" id="levels-screen-title">MEME LEVELS</h2>
                <div style="width: 70px;"></div>
            </div>

            <div class="levels-container">
                <div class="levels-grid" id="levels-grid-container">
                    <!-- Dynamically generated levels will go here -->
                </div>
            </div>
        </div>

        <!-- 2. Game Screen -->
        <div id="game-screen" class="screen">
            <!-- HUD / Top Bar -->
            <div class="game-hud">
                <button class="hud-btn" id="back-to-menu-btn" title="Back to Menu">
                    <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7M5 12h14"/></svg>
                    Menu
                </button>

                <div class="hud-stats">
                    <div class="stat-box">
                        <span class="stat-label">MOVES</span>
                        <span class="stat-value" id="moves-count">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">TIME</span>
                        <span class="stat-value" id="game-timer">00:00</span>
                    </div>
                </div>

                <div class="hud-actions">
                    <button class="hud-btn icon-only" id="game-sound-toggle" title="Toggle Sound">
                        <!-- Sound SVG injected by JS dynamically -->
                    </button>
                    <button class="hud-btn icon-only" id="restart-level-btn" title="Restart Level">
                        <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                    </button>
                </div>
            </div>

            <!-- Puzzle Grid Container -->
            <div class="puzzle-container">
                <div id="puzzle-board" class="puzzle-board-grid"></div>
            </div>

            <!-- Bottom Control panel / Help -->
            <div class="game-footer">
                <div class="controls-hint">
                    <span id="level-display-name">Level 1 - Classic Meme</span><br>
                    <span>Use Arrows / WASD or Click/Swipe to slide</span>
                </div>
                <button class="hud-btn text-btn" id="preview-art-btn">
                    <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                    Preview Meme
                </button>
            </div>
        </div>

        <!-- 3. Victory Screen / Overlay -->
        <div id="victory-screen" class="screen">
            <canvas id="confetti-canvas"></canvas>
            <div class="victory-card">
                <div class="victory-badge-container">
                    <svg class="svg-icon-victory" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34M12 2a4 4 0 0 1 4 4v5a4 4 0 0 1-4 4 4 4 0 0 1-4-4V6a4 4 0 0 1 4-4Z"/></svg>
                </div>
                <h2 class="victory-title">VICTORY!</h2>
                <p class="victory-subtitle" id="victory-subtitle-text">You solved the puzzle!</p>

                <div class="victory-stats">
                    <div class="victory-stat-item">
                        <span class="v-label">Moves</span>
                        <span class="v-value" id="final-moves">0</span>
                    </div>
                    <div class="victory-stat-item">
                        <span class="v-label">Time</span>
                        <span class="v-value" id="final-time">00:00</span>
                    </div>
                    <div class="victory-stat-item">
                        <span class="v-label">Level</span>
                        <span class="v-value" id="final-level">1</span>
                    </div>
                </div>

                <div class="victory-actions">
                    <button class="primary-btn" id="next-puzzle-btn">NEXT LEVEL</button>
                    <button class="secondary-btn" id="victory-menu-btn">MAIN MENU</button>
                </div>
            </div>
        </div>

        <!-- Preview Modal -->
        <div id="preview-modal" class="modal-overlay">
            <div class="modal-content">
                <button class="close-modal-btn" id="close-preview-btn">&times;</button>
                <h3>Target Meme Image</h3>
                <div id="modal-art-preview"></div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal-overlay">
            <div class="modal-content">
                <button class="close-modal-btn" id="close-settings-btn">&times;</button>
                <h3>SETTINGS</h3>
                <div class="settings-options-list">
                    <div class="settings-item-column">
                        <label for="volume-slider">GAME VOLUME</label>
                        <div class="volume-control-row">
                            <span class="volume-icon-span" id="volume-slider-icon">🔊</span>
                            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5">
                            <span id="volume-percent">50%</span>
                        </div>
                    </div>

                    <div class="settings-item">
                        <button class="danger-btn" id="reset-progress-btn">
                            <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
                            RESET ALL PROGRESS
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
